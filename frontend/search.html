<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QueryTube AI - Search</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1 onclick="location.href='index.html'" style="cursor:pointer;">QueryTube AI</h1>
    <input id="searchBox" placeholder="Search videos..." />
    <button onclick="search()">Search</button>
</header>

<div id="results"></div>

<script src="js/app.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);
    const query = params.get("q");
    if(query){
        document.getElementById("searchBox").value = query;
        search();
    }
</script>

</body>
</html>
